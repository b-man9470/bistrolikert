// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('home');
  const [adv,setAdv]=useState('special');
  const [isAdmin,setIsAdmin]=useState(false);
  const [loading,setLoading]=useState(true);
  const [dishes,setDishes]=useState(DEF_DISHES);
  const [drinks,setDrinks]=useState(DEF_DRINKS);
  const [special,setSpecial]=useState(DEF_SPECIAL);

  useEffect(()=>{
    (async()=>{
      const d=await sGet(SK.dishes),r=await sGet(SK.drinks),s=await sGet(SK.special);
      if(d)setDishes(d);if(r)setDrinks(r);if(s)setSpecial(s);
      setLoading(false);
    })();
  },[]);

  const upDishes=async v=>{setDishes(v);await sSet(SK.dishes,v)};
  const upDrinks=async v=>{setDrinks(v);await sSet(SK.drinks,v)};
  const upSpecial=async v=>{setSpecial(v);await sSet(SK.special,v)};
  const go=v=>{setView(v)};

  if(loading)return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:300,color:'var(--text-muted)'}},'Laden…');

  const navItems=[['home','Home'],['gerechten','Gerechten'],['dranken','Dranken'],['contact','Contact']];

  return React.createElement('div',{style:{fontFamily:'var(--font-sans)',minHeight:'100vh',background:'transparent',color:'var(--text-primary)'}},
    // NAV
    React.createElement('nav',{style:S.nav},
      React.createElement('div',{style:S.navIn},
        React.createElement('span',{style:S.logo,onClick:()=>go('home')},'Bistro Likert'),
        React.createElement('div',{style:S.navLinks},
          ...navItems.map(([v,l])=>React.createElement('button',{key:v,style:S.nb(view===v),onClick:()=>go(v)},l)),
          React.createElement('button',{style:{...S.nb(view==='admin'),color:isAdmin?A:'#6b5c4a'},onClick:()=>go('admin')},
            isAdmin?'⚙ Beheer':'Beheer')
        )
      )
    ),
    // MAIN
    React.createElement('div',{style:S.main},
      view==='home'&&React.createElement(HomeView,{special,go}),
      view==='gerechten'&&React.createElement(MenuView,{data:dishes,title:'Onze gerechten'}),
      view==='dranken'&&React.createElement(MenuView,{data:drinks,title:'Onze dranken'}),
      view==='contact'&&React.createElement(ContactView,null),
      view==='admin'&&React.createElement(AdminView,{isAdmin,setIsAdmin,adv,setAdv,dishes,upDishes,drinks,upDrinks,special,upSpecial})
    ),
    // FOOTER
    React.createElement('footer',{style:S.footer},
      React.createElement('p',{style:{margin:'0 0 4px',fontFamily:'Georgia,serif',color:'#9a8070',fontSize:15}},'Bistro Likert'),
      React.createElement('p',{style:{margin:0}},
        'Marktplaats 12 · 1770 Liedekerke · ',
        React.createElement('span',{style:{color:'#8a7060'}},'+32 54 12 34 56')
      ),
      !isAdmin&&React.createElement('button',{onClick:()=>go('admin'),style:{marginTop:8,background:'none',border:'none',color:'#5a4a3a',fontSize:11,cursor:'pointer',textDecoration:'underline'}},'Eigenaar? Aanmelden')
    )
  );
}

      React.createElement('div',{style:S.specialBox},

  const tabs=[['special','⭐ Suggestie'],['gerechten','🍽 Gerechten'],['dranken','🍷 Dranken']];
  return React.createElement('div',null,

      React.createElement('button',{style:S.btn('d2'),onClick:()=>setIsAdmin(false)},'Afmelden')
    ),
    React.createElement('div',{style:{display:'flex',gap:'1.25rem',alignItems:'flex-start'}},
      React.createElement('div',{style:S.sb},
        React.createElement('p',{style:{fontSize:11,color:'var(--text-muted)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}},'Beheer'),

function AdminLogin({setIsAdmin}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  const login=()=>{if(pw===PASS){setIsAdmin(true)}else setErr(true)};
  return React.createElement('div',{style:{maxWidth:340,margin:'3rem auto'}},
    React.createElement('div',{style:S.card},
      React.createElement('div',{style:{textAlign:'center',marginBottom:'1.5rem'}},
        React.createElement('div',{style:{fontSize:32,marginBottom:'0.5rem'}},'🔒'),
        React.createElement('h2',{style:{fontSize:18,fontWeight:500,marginBottom:4}},'Aanmelden'),
        React.createElement('p',{style:{fontSize:13,color:'var(--text-secondary)'}},'Alleen voor de eigenaar van Bistro Likert')
      ),
      React.createElement('label',{style:S.lbl},'Wachtwoord'),
      React.createElement('input',{type:'password',value:pw,style:{...S.inp,marginBottom:err?6:14},
        onChange:e=>{setPw(e.target.value);setErr(false)},
        onKeyDown:e=>e.key==='Enter'&&login(),
        placeholder:'Voer wachtwoord in'}),
      err&&React.createElement('p',{style:{color:'#c0392b',fontSize:12,marginBottom:10}},'Ongeldig wachtwoord. Probeer opnieuw.'),
      React.createElement('button',{style:{...S.btn('p'),width:'100%',padding:'9px'},onClick:login},'Aanmelden'),
      React.createElement('p',{style:{fontSize:11,color:'var(--text-muted)',marginTop:12,textAlign:'center'}},'Demo wachtwoord: bistro2024')
    )
  );
}

// ─── Admin Special ────────────────────────────────────────────────────────────
function AdminSpecial({special,upSpecial}){
  const [form,setForm]=useState({...special});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handlePhoto=async e=>{const f=e.target.files[0];if(f){const b=await toB64(f);set('photo',b)}};
  const save=async()=>{await upSpecial(form);setSaved(true);setTimeout(()=>setSaved(false),2500)};
  return React.createElement('div',{style:S.card},
    React.createElement('h2',{style:{fontSize:16,fontWeight:500,marginBottom:'1.25rem'}},'Suggestie van de week'),
    React.createElement('div',{style:{display:'grid',gap:12}},
      React.createElement('div',null,
        React.createElement('label',{style:S.lbl},'Naam van het gerecht'),
        React.createElement('input',{style:S.inp,value:form.title,onChange:e=>set('title',e.target.value),placeholder:'Bijv. Gegrilde zalm met kruidenboter'})
      ),
      React.createElement('div',null,
        React.createElement('label',{style:S.lbl},'Beschrijving'),
        React.createElement('textarea',{style:S.ta,value:form.description,onChange:e=>set('description',e.target.value),placeholder:'Korte beschrijving van het gerecht…'})
      ),
      React.createElement('div',null,
        React.createElement('label',{style:S.lbl},'Prijs (€)'),
        React.createElement('input',{style:{...S.inp,width:120},type:'number',step:'0.5',value:form.price,onChange:e=>set('price',parseFloat(e.target.value)||0)})
      ),
      React.createElement('div',null,
        React.createElement('label',{style:S.lbl},'Foto (optioneel)'),
        React.createElement('input',{type:'file',accept:'image/*',onChange:handlePhoto,style:{fontSize:13}}),
        form.photo&&React.createElement('div',{style:{display:'flex',gap:10,alignItems:'flex-start',marginTop:8}},
          React.createElement('img',{src:form.photo,alt:'',style:{width:100,height:75,objectFit:'cover',borderRadius:7}}),
          React.createElement('button',{style:{...S.btn('d2'),fontSize:12,padding:'4px 10px'},onClick:()=>set('photo',null)},'Verwijderen')
        )
      )
    ),
    React.createElement('div',{style:{marginTop:16,display:'flex',gap:10,alignItems:'center'}},
      React.createElement('button',{style:{...S.btn('p'),padding:'8px 20px'},onClick:save},'Opslaan'),
      saved&&React.createElement('span',{style:{color:'#27ae60',fontSize:13}},'✓ Opgeslagen!')
    ),
    // Preview
    React.createElement('div',{style:{marginTop:20,paddingTop:16,borderTop:'0.5px solid var(--border)'}},
      React.createElement('p',{style:{fontSize:11,color:'var(--text-muted)',marginBottom:10}},'Voorvertoning:'),
      React.createElement('div',{style:{...S.specialBox,padding:'1.25rem'}},
        React.createElement('div',{style:{display:'flex',gap:'1rem',flexWrap:'wrap',alignItems:'flex-start'}},
          form.photo&&React.createElement('img',{src:form.photo,alt:'',style:{width:100,height:75,objectFit:'cover',borderRadius:7,flexShrink:0}}),
          React.createElement('div',null,
            React.createElement('span',{style:S.specialBadge},'Suggestie van de week'),
            React.createElement('p',{style:{...S.specialTitle,fontSize:18}},form.title||'(geen titel)'),
            React.createElement('p',{style:{...S.specialDesc,fontSize:13}},form.description||'(geen beschrijving)'),
            form.price>0&&React.createElement('p',{style:{...S.specialPrice,fontSize:16}},eur(form.price))
          )
        )
      )
    )
  );
}

// ─── Admin Menu (herbruikt voor Gerechten en Dranken) ──────────────────────────
function AdminMenu({data,upData,label}){
  const [editing,setEditing]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [saved,setSaved]=useState(false);
  const [newCat,setNewCat]=useState('');
  const setEF=(k,v)=>setEditForm(f=>({...f,[k]:v}));

  const notify=async m=>{await upData(m);setSaved(true);setTimeout(()=>setSaved(false),2000)};
  const startEdit=(catId,item)=>{setEditing(`${catId}|${item.id}`);setEditForm({...item})};
  const cancelEdit=()=>{setEditing(null);setEditForm({})};
  const saveEdit=async(catId)=>{
    const m=data.map(c=>c.id!==catId?c:{...c,items:c.items.map(i=>i.id===editForm.id?{...editForm,price:parseFloat(editForm.price)||0}:i)});
    await notify(m);cancelEdit();
  };
  const addItem=async catId=>{
    const m=data.map(c=>c.id!==catId?c:{...c,items:[...c.items,{id:uid(),name:'Nieuw item',description:'',price:5}]});
    await notify(m);
  };
  const delItem=async(catId,iid)=>{
    const m=data.map(c=>c.id!==catId?c:{...c,items:c.items.filter(i=>i.id!==iid)});
    await notify(m);
  };
  const setCatNote=async(catId,note)=>{
    const m=data.map(c=>c.id!==catId?c:{...c,note});
    await notify(m);
  };
  const addCat=async()=>{
    if(!newCat.trim())return;
    await notify([...data,{id:uid(),category:newCat.trim(),items:[]}]);
    setNewCat('');
  };
  const delCat=async catId=>{
    if(!window.confirm('Categorie en alle items verwijderen?'))return;
    await notify(data.filter(c=>c.id!==catId));
  };

  return React.createElement('div',null,
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:'1.25rem'}},
      React.createElement('h2',{style:{fontSize:16,fontWeight:500}},label==='drank'?'Dranken beheren':'Gerechten beheren'),
      saved&&React.createElement('span',{style:{color:'#27ae60',fontSize:13}},'✓ Opgeslagen')
    ),
    ...data.map(cat=>React.createElement('div',{key:cat.id,style:S.card},
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'0.5rem'}},
        React.createElement('span',{style:{fontWeight:500,fontSize:14}},cat.category),
        React.createElement('div',{style:{display:'flex',gap:6}},
          React.createElement('button',{style:{...S.btn(),padding:'4px 10px',fontSize:12},onClick:()=>addItem(cat.id)},`+ ${label==='drank'?'Drank':'Gerecht'}`),
          React.createElement('button',{style:{...S.btn('d2'),padding:'4px 8px',fontSize:12},onClick:()=>delCat(cat.id)},'✕')
        )
      ),
      React.createElement('input',{
        style:{...S.inp,fontSize:12,marginBottom:10,fontStyle:'italic'},
        value:cat.note||'',
        placeholder:'Opmerking bij categorie (optioneel)',
        onChange:e=>setCatNote(cat.id,e.target.value)
      }),
      ...cat.items.map(item=>{
        const key=`${cat.id}|${item.id}`;
        const isEditing=editing===key;
        if(isEditing)return React.createElement('div',{key:item.id,style:{background:'var(--surface-1)',borderRadius:8,padding:'10px',marginBottom:6}},
          React.createElement('div',{style:{display:'grid',gap:8}},
            React.createElement('div',{style:{display:'flex',gap:8}},
              React.createElement('input',{style:{...S.inp,flex:2},value:editForm.name||'',onChange:e=>setEF('name',e.target.value),placeholder:'Naam'}),
              React.createElement('input',{style:{...S.inp,width:80},type:'number',step:'0.5',value:editForm.price||'',onChange:e=>setEF('price',e.target.value),placeholder:'Prijs'})
            ),
            React.createElement('input',{style:S.inp,value:editForm.description||'',onChange:e=>setEF('description',e.target.value),placeholder:'Beschrijving (optioneel)'}),
            React.createElement('div',{style:{display:'flex',gap:6}},
              React.createElement('button',{style:{...S.btn('p'),padding:'5px 12px',fontSize:12},onClick:()=>saveEdit(cat.id)},'Opslaan'),
              React.createElement('button',{style:{...S.btn(),padding:'5px 12px',fontSize:12},onClick:cancelEdit},'Annuleren')
            )
          )
        );
        return React.createElement('div',{key:item.id,style:{...S.menuRow,alignItems:'center',fontSize:13}},
          React.createElement('div',{style:{flex:1}},
            React.createElement('span',{style:{fontWeight:500}},item.name),
            item.description&&React.createElement('span',{style:{color:'var(--text-muted)',marginLeft:6,fontSize:12}},item.description)
          ),
          React.createElement('span',{style:{...S.menuPrice,fontSize:13}},eur(item.price)),
          React.createElement('div',{style:{display:'flex',gap:4,marginLeft:8}},
            React.createElement('button',{style:{...S.btn(),padding:'3px 7px',fontSize:12},onClick:()=>startEdit(cat.id,item)},'✏️'),
            React.createElement('button',{style:{...S.btn('d2'),padding:'3px 7px',fontSize:12},onClick:()=>delItem(cat.id,item.id)},'🗑')
          )
        );
      }),
      cat.items.length===0&&React.createElement('p',{style:{color:'var(--text-muted)',fontSize:13,textAlign:'center',padding:'0.5rem 0'}},`Geen items — klik op "+ ${label==='drank'?'Drank':'Gerecht'}" om toe te voegen.`)
    )),
    React.createElement('div',{style:{...S.card,display:'flex',gap:8,alignItems:'center'}},
      React.createElement('input',{style:{...S.inp,flex:1},value:newCat,onChange:e=>setNewCat(e.target.value),onKeyDown:e=>e.key==='Enter'&&addCat(),placeholder:label==='drank'?'Nieuwe categorie (bijv. Cocktails)':'Nieuwe categorie (bijv. Soepen)'}),
      React.createElement('button',{style:{...S.btn('p'),flexShrink:0},onClick:addCat},'+ Categorie')
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
